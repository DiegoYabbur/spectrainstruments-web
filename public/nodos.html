<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpectraCloud | Mis Nodos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Inter:wght@400;500;600&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

<div class="dashboard-layout">
    
    <aside class="dashboard-sidebar">
        <div class="sidebar-brand">
            <h2>SPECTRA_</h2>
            <span class="badge live">LIVE</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Panel General
            </a>
             <a href="nodos.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                  <rect x="9" y="9" width="6" height="6"></rect>
                  <line x1="9" y1="1" x2="9" y2="4"></line>
                  <line x1="15" y1="1" x2="15" y2="4"></line>
                  <line x1="9" y1="20" x2="9" y2="23"></line>
                  <line x1="15" y1="20" x2="15" y2="23"></line>
                  <line x1="20" y1="9" x2="23" y2="9"></line>
                  <line x1="20" y1="14" x2="23" y2="14"></line>
                  <line x1="1" y1="9" x2="4" y2="9"></line>
                  <line x1="1" y1="14" x2="4" y2="14"></line>
                </svg>
                Mis Nodos
            </a>
            <a href="exportar.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
                Exportar Datos (CSV/ZIP)
            </a>
        </nav>

        <div class="sidebar-bottom">
            <div class="user-info">
                <p class="user-id">Cargando...</p>
                <p class="user-role">Acceso Autorizado</p>
            </div>
            <a href="spectracloud.html" class="nav-item logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path></svg>
                Cerrar Sesión
            </a>
        </div>
    </aside>

    <main class="dashboard-main">
        
        <header class="dashboard-header">
            <div>
                <h1 class="dash-title">GESTIÓN DE FLOTA_</h1>
                <p class="dash-subtitle">Listado de estaciones asignadas a tu cuenta</p>
            </div>
            <div class="dash-actions">
                <button class="btn-main btn-sm">Aprovisionar Equipo +</button>
            </div>
        </header>

        <div class="nodes-grid" id="nodes-container">
            <p style="color: #666; font-family: 'JetBrains Mono';">Leyendo registros de la base de datos...</p>
        </div>

    </main>
</div>

<script>
    // 1. SESIÓN
    const usuarioActual = localStorage.getItem('spectraUser');
    if (!usuarioActual) window.location.href = "spectracloud.html";
    document.querySelector('.user-id').innerText = usuarioActual;
    document.querySelector('.logout').addEventListener('click', () => localStorage.removeItem('spectraUser'));

    // 2. OBTENER Y DIBUJAR LOS NODOS
    async function cargarNodos() {
        try {
            // Llamamos a la nueva ruta que creamos en index.js
            const respuesta = await fetch(`/api/nodos?usuario=${usuarioActual}`);
            const estaciones = await respuesta.json();
            
            const contenedor = document.getElementById('nodes-container');
            contenedor.innerHTML = ''; // Limpiamos el mensaje de carga

            if (!estaciones || estaciones.length === 0) {
                contenedor.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 50px; border: 1px dashed #333;">
                        <p style="color: #888;">No tienes estaciones de telemetría asignadas a esta cuenta.</p>
                        <a href="contacto.html" class="btn-outline" style="margin-top: 15px;">Contactar Soporte B2B</a>
                    </div>
                `;
                return;
            }

            // Si hay estaciones, creamos una tarjeta por cada una
            estaciones.forEach(est => {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'node-card';
                
                // HTML dinámico para la tarjeta
                tarjeta.innerHTML = `
                    <div class="node-header">
                        <div class="node-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </div>
                        <div class="node-status-indicator">
                            <div class="status-dot"></div> ONLINE
                        </div>
                    </div>
                    
                    <div class="node-info">
                        <h3>${est.nombre || 'Estación Sin Nombre'}</h3>
                        <p>// ID: ${est.device_id}</p>
                    </div>

                    <div class="node-meta">
                        <div class="meta-item">
                            <span class="meta-label">Ubicación:</span>
                            <span class="meta-value">${est.ubicacion || 'No definida'}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Protocolo:</span>
                            <span class="meta-value">LoRaWAN / WiFi</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Modelo:</span>
                            <span class="meta-value">spectraLog V1</span>
                        </div>
                    </div>

                    <div class="node-actions">
                        <a href="dashboard.html" class="btn-outline">Ver Telemetría</a>
                        <button class="btn-outline" style="border-color: #333; color: #666;">Configurar</button>
                    </div>
                `;
                contenedor.appendChild(tarjeta);
            });

        } catch (error) {
            console.error("Error conectando al backend:", error);
            document.getElementById('nodes-container').innerHTML = "<p style='color:red;'>Error crítico al leer la flota.</p>";
        }
    }

    // 3. ARRANQUE
    window.onload = () => {
        cargarNodos(); 
    };
</script>

</body>
</html>
